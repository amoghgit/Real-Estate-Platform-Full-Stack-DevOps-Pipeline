name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/realestate-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/realestate-frontend

jobs:
  # ── Job 1: Test ──
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Run backend tests
        run: cd backend && npm test
        env:
          NODE_ENV: test
          MONGO_URI: mongodb://localhost:27017/realestate_test

  # ── Job 2: Build & Push Docker Images ──
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 3: Deploy to Kubernetes ──
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Ensure fresh, readable kubeconfig for the deployment
            mkdir -p ~/.kube
            sudo cp /etc/rancher/k3s/k3s.yaml ~/.kube/config
            sudo chown ubuntu:ubuntu ~/.kube/config
            export KUBECONFIG=~/.kube/config

            # Update kubectl configs
            cd ~/realestate || git clone https://github.com/${{ github.repository }}.git ~/realestate
            cd ~/realestate && git pull origin main

            # Update image tags and pull policy in K8s manifests
            sed -i "s|devopsproject-backend:latest|${{ env.BACKEND_IMAGE }}:latest|g" k8s/backend-deployment.yaml
            sed -i "s|devopsproject-frontend:latest|${{ env.FRONTEND_IMAGE }}:latest|g" k8s/frontend-deployment.yaml
            sed -i "s|imagePullPolicy: IfNotPresent|imagePullPolicy: Always|g" k8s/backend-deployment.yaml
            sed -i "s|imagePullPolicy: IfNotPresent|imagePullPolicy: Always|g" k8s/frontend-deployment.yaml

            # Apply Kubernetes manifests
            kubectl apply -f k8s/namespace.yaml
            kubectl apply -f k8s/mongodb-pvc.yaml
            kubectl apply -f k8s/mongodb-deployment.yaml
            kubectl apply -f k8s/mongodb-service.yaml
            kubectl apply -f k8s/backend-deployment.yaml
            kubectl apply -f k8s/backend-service.yaml
            kubectl apply -f k8s/frontend-deployment.yaml
            kubectl apply -f k8s/frontend-service.yaml
            kubectl apply -f k8s/ingress.yaml

            # Restart deployments to pull latest images
            kubectl rollout restart deployment/backend -n realestate
            kubectl rollout restart deployment/frontend -n realestate

            # Verify deployment
            kubectl get pods -n realestate
